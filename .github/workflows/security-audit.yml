name: Security Audit

on:
  push:
    branches: [main, master]
    paths:
      - Cargo.toml
      - Cargo.lock
      - "crates/**/Cargo.toml"
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - "crates/**/Cargo.toml"
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
