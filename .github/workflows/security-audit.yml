name: Security Audit

on:
  push:
    branches: [main, master]
    paths:
      - Cargo.toml
      - Cargo.lock
      - "crates/**/Cargo.toml"
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - "crates/**/Cargo.toml"
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # audit-check creates GitHub Check Runs; this needs checks:write and
      # is not available for forked PR tokens.
      - name: Run security audit (check run mode)
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Fallback path for forked PRs where Checks API write is unavailable.
      - name: Install Rust toolchain
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        uses: dtolnay/rust-toolchain@stable

      - name: Run security audit (fork-safe mode)
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          cargo install cargo-audit --locked
          cargo audit
