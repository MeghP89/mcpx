name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: Check all targets
        run: cargo check --workspace --all-targets

  build-matrix:
    name: Build (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build workspace (release)
        run: cargo build --workspace --release

  ci-sarif:
    name: CI Scan (SARIF)
    runs-on: ubuntu-latest
    # SARIF upload requires security-events:write, unavailable for fork PR tokens.
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build mcpx
        run: cargo build -p mcpx

      - name: Run mcpx CI scan (SARIF)
        run: |
          mkdir -p artifacts
          target/debug/mcpx ci scan \
            --baseline .github/ci/mcpx-baseline.json \
            --target .github/ci/mcpx-target.json \
            --format sarif \
            --out artifacts/mcpx-ci.sarif \
            --fail-on blocked || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: artifacts/mcpx-ci.sarif
